name: Validate Script

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Check module syntax
        run: |
          uv run python -m py_compile src/sync_ai_config/cli.py

      - name: Validate CLI help
        run: |
          uv run sync-ai-config --help
